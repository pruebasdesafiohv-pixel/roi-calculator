<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROI Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #app {
      width: 100%;
      max-width: 780px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      height: 92vh;
      max-height: 780px;
      overflow: hidden;
    }

    /* ── Header ── */
    #hdr {
      padding: 14px 20px;
      background: #fff;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #3B6D11, #639922);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #fff; font-weight: 700;
      flex-shrink: 0;
    }
    #hdr .title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    #hdr .subtitle { font-size: 12px; color: #888; margin-top: 1px; }

    /* ── Messages ── */
    #msgs {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #f7f8fa;
      scroll-behavior: smooth;
    }

    .msg { display: flex; gap: 8px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .av {
      width: 30px; height: 30px;
      background: #3B6D11;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #fff; font-weight: 700;
      flex-shrink: 0; margin-top: 2px;
    }

    .bbl {
      padding: 11px 15px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.6;
      max-width: 88%;
      word-break: break-word;
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #e8e8e8;
      border-bottom-left-radius: 4px;
    }
    .msg.user .bbl {
      background: #3B6D11;
      color: #fff;
      border: none;
      border-bottom-right-radius: 4px;
      border-bottom-left-radius: 16px;
    }

    /* ── Tables inside bubble ── */
    .bbl h4 {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      margin: 14px 0 7px;
      padding-bottom: 4px;
      border-bottom: 2px solid #3B6D11;
    }
    .bbl h4:first-child { margin-top: 4px; }

    .bbl table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .bbl th {
      background: #3B6D11;
      color: #EAF3DE;
      padding: 7px 9px;
      text-align: left;
      font-weight: 500;
      font-size: 11.5px;
    }
    .bbl td {
      padding: 6px 9px;
      border-bottom: 1px solid #f0f0f0;
      color: #1a1a1a;
      vertical-align: top;
    }
    .bbl tr:last-child td { border-bottom: none; }
    .bbl tr:nth-child(even) td { background: #f9fbf6; }
    .bbl tr.total td {
      background: #EAF3DE;
      font-weight: 600;
      border-top: 2px solid #3B6D11;
    }
    .bbl td.r, .bbl th.r {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ── ROI Result box ── */
    .roi-resultado {
      background: #f0f7e8;
      border: 1px solid #c0dd97;
      border-radius: 10px;
      padding: 14px 16px;
      margin: 14px 0 6px;
    }
    .roi-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #d4e8b0;
    }
    .roi-item:last-of-type { border-bottom: none; }
    .roi-label { font-size: 13px; color: #3B6D11; font-weight: 500; }
    .roi-valor { font-size: 20px; font-weight: 700; color: #27500A; }
    .roi-detalle {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #c0dd97;
      font-size: 11.5px;
      color: #5a7a3a;
      line-height: 1.6;
    }

    /* ── Download button ── */
    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 10px 20px;
      background: #3B6D11;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, transform .1s;
    }
    .dl-btn:hover { background: #27500A; }
    .dl-btn:active { transform: scale(0.98); }
    .dl-btn svg {
      width: 15px; height: 15px;
      fill: none; stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Typing indicator ── */
    .dots { display: flex; gap: 5px; align-items: center; padding: 3px 0; }
    .dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #bbb;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    #foot {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: #fff;
      flex-shrink: 0;
    }
    #inp {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 13.5px;
      font-family: inherit;
      background: #fafafa;
      color: #1a1a1a;
      resize: none;
      line-height: 1.45;
      max-height: 110px;
      overflow-y: auto;
      outline: none;
      transition: border-color .15s, background .15s;
    }
    #inp:focus { border-color: #3B6D11; background: #fff; }
    #inp::placeholder { color: #bbb; }
    #snd {
      padding: 10px 20px;
      background: #3B6D11;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 13.5px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    #snd:hover { background: #27500A; }
    #snd:active { transform: scale(0.97); }
    #snd:disabled { background: #ccc; cursor: default; transform: none; }
  </style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="logo">R</div>
    <div>
      <div class="title">ROI Calculator</div>
      <div class="subtitle">Asistente de retorno de inversión</div>
    </div>
  </div>
  <div id="msgs"></div>
  <div id="foot">
    <textarea id="inp" placeholder="Escribe tu mensaje... (Enter para enviar)" rows="1"></textarea>
    <button id="snd">Enviar</button>
  </div>
</div>

<script>
let hist = [];
let roiData = null;

/* ─── Excel export ─────────────────────────────────────── */
function buildExcel(data) {
  const wb = XLSX.utils.book_new();
  const fmt = n => typeof n === 'number' ? n : parseFloat(String(n).replace(/\./g,'').replace(',','.')) || 0;

  /* Tabla 1 */
  const t1 = [['Tarea','Responsable','Horas/día','Salario mensual (CLP)','Valor hora (CLP)','Costo diario (CLP)','Costo anual (CLP)']];
  (data.tabla1 || []).forEach(r => t1.push([r.tarea, r.responsable, r.horas, fmt(r.salario), fmt(r.valorHora), fmt(r.costoDiario), fmt(r.costoAnual)]));
  const ws1 = XLSX.utils.aoa_to_sheet(t1);
  ws1['!cols'] = [28,18,10,22,18,18,20].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws1, 'Tabla 1 - Tareas');

  /* Tabla 2 */
  const t2 = [['Tarea','Costo anual proceso (CLP)']];
  (data.tabla2 || []).forEach(r => t2.push([r.tarea, fmt(r.costoAnual)]));
  t2.push(['Beneficios totales', fmt(data.beneficiosTotales)]);
  const ws2 = XLSX.utils.aoa_to_sheet(t2);
  ws2['!cols'] = [{wch:32},{wch:24}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Tabla 2 - Beneficios');

  /* Tabla 3 */
  const t3 = [['Actividad','Costo anual implementación (CLP)']];
  (data.tabla3 || []).forEach(r => t3.push([r.actividad, fmt(r.costo)]));
  t3.push(['Costos totales', fmt(data.costosTotales)]);
  t3.push(['Costos totales Año 2+', fmt(data.costosTotalesAno2)]);
  const ws3 = XLSX.utils.aoa_to_sheet(t3);
  ws3['!cols'] = [{wch:34},{wch:30}];
  XLSX.utils.book_append_sheet(wb, ws3, 'Tabla 3 - Costos');

  /* Resumen ROI */
  const t4 = [
    ['Indicador','Valor'],
    ['Beneficios totales (CLP)', fmt(data.beneficiosTotales)],
    ['Costos totales Año 1 (CLP)', fmt(data.costosTotales)],
    ['Costos totales Año 2+ (CLP)', fmt(data.costosTotalesAno2)],
    ['ROI Año 1 (%)', data.roi1],
    ['ROI Año 2+ (%)', data.roi2],
    ['Fecha', new Date().toLocaleDateString('es-CL')],
  ];
  const ws4 = XLSX.utils.aoa_to_sheet(t4);
  ws4['!cols'] = [{wch:28},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws4, 'Resumen ROI');

  XLSX.writeFile(wb, 'Reporte_ROI.xlsx');
}
window.buildExcel = buildExcel;

/* ─── Parse HTML report from AI to extract structured data ─ */
function parseReport(html) {
  const doc = new DOMParser().parseFromString('<div>'+html+'</div>', 'text/html');
  const tables = doc.querySelectorAll('table');
  const clean = s => s.replace(/\s+/g,' ').trim();
  const num   = s => parseFloat(clean(s).replace(/\./g,'').replace(',','.')) || 0;

  const tabla1 = [];
  if (tables[0]) {
    tables[0].querySelectorAll('tr').forEach((row, i) => {
      if (i === 0) return;
      const c = row.querySelectorAll('td');
      if (c.length >= 7) tabla1.push({
        tarea: clean(c[0].textContent), responsable: clean(c[1].textContent),
        horas: clean(c[2].textContent), salario: num(c[3].textContent),
        valorHora: num(c[4].textContent), costoDiario: num(c[5].textContent),
        costoAnual: num(c[6].textContent)
      });
    });
  }

  const tabla2 = [];
  let beneficiosTotales = 0;
  if (tables[1]) {
    const rows = tables[1].querySelectorAll('tr');
    rows.forEach((row, i) => {
      if (i === 0) return;
      const c = row.querySelectorAll('td');
      if (c.length >= 2) {
        const label = clean(c[0].textContent);
        const val = num(c[1].textContent);
        if (label.toLowerCase().includes('beneficio')) beneficiosTotales = val;
        else tabla2.push({ tarea: label, costoAnual: val });
      }
    });
  }

  const tabla3 = [];
  let costosTotales = 0;
  if (tables[2]) {
    tables[2].querySelectorAll('tr').forEach((row, i) => {
      if (i === 0) return;
      const c = row.querySelectorAll('td');
      if (c.length >= 2) {
        const label = clean(c[0].textContent);
        const val = num(c[1].textContent);
        if (label.toLowerCase().includes('costo')) costosTotales = val;
        else tabla3.push({ actividad: label, costo: val });
      }
    });
  }

  const rb = doc.querySelector('.roi-resultado');
  let roi1 = '', roi2 = '', costosTotalesAno2 = 0;
  if (rb) {
    const txt = rb.textContent;
    const m1 = txt.match(/ROI\s+Año\s+1[^%\d]*([\d.,]+)\s*%/i);
    const m2 = txt.match(/ROI\s+Año\s+2[^%\d]*([\d.,]+)\s*%/i);
    const m3 = txt.match(/Costos\s+Año\s+2\+[:\s$]+([\d.]+)/i);
    if (m1) roi1 = m1[1];
    if (m2) roi2 = m2[1];
    if (m3) costosTotalesAno2 = num(m3[1]);
  }

  return { tabla1, tabla2, tabla3, beneficiosTotales, costosTotales, costosTotalesAno2, roi1, roi2 };
}

/* ─── DOM helpers ──────────────────────────────────────── */
function addMsg(role, html) {
  const msgs = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;

  if (role === 'bot') {
    const av = document.createElement('div');
    av.className = 'av'; av.textContent = 'R';
    wrap.appendChild(av);
  }

  const bbl = document.createElement('div');
  bbl.className = 'bbl';

  let processed = html
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');

  if (processed.includes('[DESCARGA_EXCEL]')) {
    const parsed = parseReport(processed);
    roiData = parsed;
    processed = processed.replace(
      '[DESCARGA_EXCEL]',
      `<br><button class="dl-btn" onclick="roiData && buildExcel(roiData)">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Descargar informe Excel
      </button>`
    );
  }

  bbl.innerHTML = processed;
  wrap.appendChild(bbl);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot'; wrap.id = 'typing';
  const av = document.createElement('div');
  av.className = 'av'; av.textContent = 'R';
  wrap.appendChild(av);
  const bbl = document.createElement('div');
  bbl.className = 'bbl';
  bbl.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  wrap.appendChild(bbl);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

/* ─── API call ─────────────────────────────────────────── */
async function send(text) {
  if (!text.trim()) return;
  const btn = document.getElementById('snd');
  const inp = document.getElementById('inp');
  btn.disabled = true; inp.disabled = true;

  addMsg('user', text);
  hist.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: hist })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.reply || 'Error al obtener respuesta.';
    hist.push({ role: 'assistant', content: reply });
    addMsg('bot', reply);
  } catch (e) {
    removeTyping();
    addMsg('bot', 'Error de conexión. Por favor intenta de nuevo.');
  }

  btn.disabled = false; inp.disabled = false; inp.focus();
}

/* ─── Init ─────────────────────────────────────────────── */
window.addEventListener('load', () => {
  const greeting = '¡Hola! Soy ROI, tu asistente para calcular el retorno de inversión. ¿Listo para comenzar?';
  addMsg('bot', greeting);
  hist.push({ role: 'assistant', content: greeting });
});

document.getElementById('snd').addEventListener('click', () => {
  const inp = document.getElementById('inp');
  const t = inp.value.trim();
  if (t) { inp.value = ''; inp.style.height = 'auto'; send(t); }
});

document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const t = e.target.value.trim();
    if (t) { e.target.value = ''; e.target.style.height = 'auto'; send(t); }
  }
});

document.getElementById('inp').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});
</script>
</body>
</html>
