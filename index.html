<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROI Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #wrap {
      width: 100%;
      max-width: 720px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 700px;
    }

    #hdr {
      padding: 14px 20px;
      background: #fff;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .av {
      width: 36px; height: 36px;
      background: #3B6D11;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #fff; font-weight: 600;
      flex-shrink: 0;
    }
    .av-sm {
      width: 28px; height: 28px;
      background: #3B6D11;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #fff; font-weight: 600;
      flex-shrink: 0; margin-top: 2px;
    }
    #hdr .name { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    #hdr .sub  { font-size: 12px; color: #888; }

    #msgs {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f9fafb;
    }

    .msg { display: flex; gap: 8px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .bbl {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.6;
      max-width: 85%;
      word-break: break-word;
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #eee;
      border-bottom-left-radius: 3px;
    }
    .msg.user .bbl {
      background: #3B6D11;
      color: #fff;
      border: none;
      border-bottom-right-radius: 3px;
      border-bottom-left-radius: 14px;
    }

    .bbl h4 { font-size: 13px; font-weight: 600; margin: 12px 0 6px; color: #1a1a1a; }
    .bbl h4:first-child { margin-top: 4px; }

    .bbl table {
      border-collapse: collapse;
      width: 100%;
      margin: 4px 0 10px;
      font-size: 12px;
    }
    .bbl th {
      background: #3B6D11;
      color: #EAF3DE;
      padding: 6px 8px;
      text-align: left;
      font-weight: 500;
    }
    .bbl td {
      padding: 5px 8px;
      border-bottom: 1px solid #f0f0f0;
      color: #1a1a1a;
    }
    .bbl tr:last-child td { border-bottom: none; }
    .bbl tr:nth-child(even) td { background: #f9f9f9; }
    .bbl td.r { text-align: right; font-variant-numeric: tabular-nums; }

    .roi-box {
      background: #f0f7e8;
      border-left: 3px solid #3B6D11;
      padding: 10px 14px;
      margin: 10px 0 6px;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      color: #1a1a1a;
    }
    .roi-box b { color: #3B6D11; font-size: 15px; }

    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 10px;
      padding: 8px 16px;
      background: #3B6D11;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }
    .dl-btn:hover { background: #27500A; }
    .dl-btn svg {
      width: 15px; height: 15px;
      fill: none; stroke: #fff;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .dots { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
    .dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #bbb;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    #foot {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: #fff;
    }
    #inp {
      flex: 1;
      padding: 9px 13px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 13.5px;
      font-family: inherit;
      background: #fafafa;
      color: #1a1a1a;
      resize: none;
      line-height: 1.4;
      max-height: 100px;
      overflow-y: auto;
      outline: none;
      transition: border-color .15s;
    }
    #inp:focus { border-color: #3B6D11; background: #fff; }
    #snd {
      padding: 9px 18px;
      background: #3B6D11;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13.5px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: background .15s;
      flex-shrink: 0;
    }
    #snd:hover { background: #27500A; }
    #snd:disabled { background: #ccc; cursor: default; }
  </style>
</head>
<body>
<div id="wrap">
  <div id="hdr">
    <div class="av">R</div>
    <div>
      <div class="name">ROI Calculator</div>
      <div class="sub">Asistente de retorno de inversión</div>
    </div>
  </div>
  <div id="msgs"></div>
  <div id="foot">
    <textarea id="inp" placeholder="Escribe tu mensaje..." rows="1"></textarea>
    <button id="snd">Enviar</button>
  </div>
</div>

<script>
  let hist = [];
  let lastROIData = null;

  function fmt(n){ return Math.round(n).toLocaleString('es-CL'); }

  function parseROIData(html){
    const doc = new DOMParser().parseFromString('<div>'+html+'</div>','text/html');
    const tables = doc.querySelectorAll('table');
    if(!tables.length) return null;
    const tasks = [];
    tables[0].querySelectorAll('tr').forEach((row,i)=>{
      if(i===0) return;
      const c = row.querySelectorAll('td');
      if(c.length>=7) tasks.push({
        tarea:c[0].textContent.trim(), responsable:c[1].textContent.trim(),
        horas:c[2].textContent.trim(), salario:c[3].textContent.trim(),
        valorHora:c[4].textContent.trim(), costoDiario:c[5].textContent.trim(),
        costoAnual:c[6].textContent.trim()
      });
    });
    const rb = doc.querySelector('.roi-box');
    let roi1='',roi2='';
    if(rb){
      const t = rb.textContent;
      const m1 = t.match(/Año 1[:\s]+([\d.,%-]+)/i);
      const m2 = t.match(/Año 2[+\s]+([\d.,%-]+)/i);
      if(m1) roi1=m1[1]; if(m2) roi2=m2[1];
    }
    return {tasks,roi1,roi2};
  }

  function buildExcel(data){
    const wb = XLSX.utils.book_new();
    const t1 = [['Tarea','Responsable','Horas/día','Salario Bruto (CLP)','Valor Hora (CLP)','Costo Diario (CLP)','Costo Anual (CLP)']];
    data.tasks.forEach(t=>t1.push([t.tarea,t.responsable,t.horas,t.salario,t.valorHora,t.costoDiario,t.costoAnual]));
    const ws1 = XLSX.utils.aoa_to_sheet(t1);
    ws1['!cols']=[28,18,12,22,18,20,20].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws1,'Tareas y Costos');
    const t2=[['Concepto','Monto (CLP)'],['Programación',1000000],['Licencias',250000],['Hosting',250000],['Mantenimiento',1200000],['Capacitación',100000],['Total Año 1',2800000],['Total Año 2+',1700000]];
    const ws2=XLSX.utils.aoa_to_sheet(t2);
    ws2['!cols']=[{wch:24},{wch:18}];
    XLSX.utils.book_append_sheet(wb,ws2,'Costos de Implementación');
    const t3=[['Indicador','Valor'],['ROI Año 1',data.roi1],['ROI Año 2+',data.roi2],['Fecha',new Date().toLocaleDateString('es-CL')]];
    const ws3=XLSX.utils.aoa_to_sheet(t3);
    ws3['!cols']=[{wch:20},{wch:16}];
    XLSX.utils.book_append_sheet(wb,ws3,'Resumen ROI');
    XLSX.writeFile(wb,'Reporte_ROI.xlsx');
  }
  window.buildExcel = buildExcel;

  function renderText(text){
    return text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  }

  function addMsg(role, html){
    const msgs = document.getElementById('msgs');
    const div = document.createElement('div');
    div.className = 'msg '+role;
    if(role==='bot'){
      const av = document.createElement('div');
      av.className='av-sm'; av.textContent='R';
      div.appendChild(av);
    }
    const bbl = document.createElement('div');
    bbl.className='bbl';
    let processed = renderText(html);
    if(processed.includes('[DESCARGA]')){
      const parsed = parseROIData(processed);
      lastROIData = parsed;
      processed = processed.replace('[DESCARGA]',`<button class="dl-btn" onclick="lastROIData && buildExcel(lastROIData)"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Descargar Excel</button>`);
    }
    bbl.innerHTML = processed;
    div.appendChild(bbl);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping(){
    const msgs=document.getElementById('msgs');
    const div=document.createElement('div');
    div.className='msg bot'; div.id='typing';
    const av=document.createElement('div');
    av.className='av-sm'; av.textContent='R';
    div.appendChild(av);
    const bbl=document.createElement('div');
    bbl.className='bbl';
    bbl.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
    div.appendChild(bbl);
    msgs.appendChild(div);
    msgs.scrollTop=msgs.scrollHeight;
  }
  function removeTyping(){ const e=document.getElementById('typing'); if(e)e.remove(); }

  async function send(text){
    if(!text.trim()) return;
    const btn=document.getElementById('snd');
    const inp=document.getElementById('inp');
    btn.disabled=true; inp.disabled=true;
    addMsg('user', text);
    hist.push({role:'user',content:text});
    showTyping();
    try{
      const res = await fetch('/api/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({messages: hist})
      });
      const data = await res.json();
      removeTyping();
      const reply = data.reply || 'Error al obtener respuesta.';
      hist.push({role:'assistant',content:reply});
      addMsg('bot', reply);
    } catch(e){
      removeTyping();
      addMsg('bot','Error de conexión. Intenta de nuevo.');
    }
    btn.disabled=false; inp.disabled=false; inp.focus();
  }

  window.addEventListener('load',()=>{
    const greeting='Hola! Soy ROI, tu asistente para calcular el retorno de inversión. ¿Listo para comenzar?';
    addMsg('bot', greeting);
    hist.push({role:'assistant',content:greeting});
  });

  document.getElementById('snd').addEventListener('click',()=>{
    const inp=document.getElementById('inp');
    const t=inp.value.trim();
    if(t){ inp.value=''; inp.style.height='auto'; send(t); }
  });
  document.getElementById('inp').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){
      e.preventDefault();
      const t=e.target.value.trim();
      if(t){ e.target.value=''; e.target.style.height='auto'; send(t); }
    }
  });
  document.getElementById('inp').addEventListener('input',function(){
    this.style.height='auto';
    this.style.height=Math.min(this.scrollHeight,100)+'px';
  });
</script>
</body>
</html>
